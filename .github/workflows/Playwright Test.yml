name: Playwright Tests

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 13 * * *'  # Runs every day at 8:00 AM EST
  workflow_dispatch:      # Allows manual trigger

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci
        
    - name: Install Playwright Chromium
      run: npx playwright install --with-deps chromium

    # Runs the tests with your GitHub Secrets securely injected
    - name: Run Playwright tests
      env:
        SEP_QA_URL: ${{ secrets.SEP_QA_URL }}
        SEP_USERNAME: ${{ secrets.SEP_USERNAME }}
        SEP_PASSWORD: ${{ secrets.SEP_PASSWORD }}
      run: npm run tests:headless

    - name: Upload Playwright test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-results
        path: |
          test-results/
          playwright-report/
        retention-days: 30
